name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v0.1.10
        env:
          API_BACKEND_URL: ${{ secrets.API_BACKEND_URL }}
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}
        with:
          host: ${{ secrets.VPS_1_HOST_IP }}
          username: ${{ secrets.VPS_1_HOST_USERNAME }}
          password: ${{ secrets.VPS_1_HOST_PASSWORD }}
          port: ${{ secrets.VPS_1_HOST_PORT }}
          envs: API_BACKEND_URL,API_SECRET_KEY
          script: |
            cd /media/${{ github.event.repository.name }}
            echo "API_BACKEND_URL=$API_BACKEND_URL" > .env
            echo "API_SECRET_KEY=$API_SECRET_KEY" >> .env
            docker compose pull
            docker compose down
            docker compose up -d
